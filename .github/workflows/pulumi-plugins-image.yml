name: Pulumi Plugins Image Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (semver, without 'v')"
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: pulumi-plugins-image-release
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: codenow-com
  IMAGE_NAME: pulumi-operator-plugins
  DOCKERFILE: images/pulumi-plugins/Dockerfile
  CONTEXT: images/pulumi-plugins
  OPERATOR_INFO_FILE: assets/vendor/generated/dataplane/pulumi-operator/pulumi-operator-info.json
  TAG_PREFIX: pulumi-plugins/v

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve image version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format. Use MAJOR.MINOR.PATCH"
            exit 1
          fi

          version="${{ inputs.version }}"
          git_tag="${TAG_PREFIX}${version}"
          image="${REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_NAME}:${version}"

          if git rev-parse "${git_tag}" >/dev/null 2>&1; then
            echo "Tag ${git_tag} already exists."
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "git_tag=${git_tag}" >> "${GITHUB_OUTPUT}"
          echo "image=${image}" >> "${GITHUB_OUTPUT}"
          echo "created=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "${GITHUB_OUTPUT}"

      - name: Resolve image inputs
        id: image-inputs
        shell: bash
        run: |
          set -euo pipefail

          source_image="$(awk -F= '/^ARG SOURCE_IMAGE=/{print $2; exit}' "${DOCKERFILE}")"
          source_image_version="$(awk -F= '/^ARG SOURCE_IMAGE_VERSION=/{print $2; exit}' "${DOCKERFILE}")"
          command_provider_version="$(awk -F= '/^ARG COMMAND_PROVIDER_VERSION=/{print $2; exit}' "${DOCKERFILE}")"
          kubernetes_provider_version="$(awk -F= '/^ARG KUBERNETES_PROVIDER_VERSION=/{print $2; exit}' "${DOCKERFILE}")"
          random_provider_version="$(awk -F= '/^ARG RANDOM_PROVIDER_VERSION=/{print $2; exit}' "${DOCKERFILE}")"
          tls_provider_version="$(awk -F= '/^ARG TLS_PROVIDER_VERSION=/{print $2; exit}' "${DOCKERFILE}")"

          if [[ -z "${source_image}" || -z "${source_image_version}" ]]; then
            echo "Could not resolve SOURCE_IMAGE or SOURCE_IMAGE_VERSION from ${DOCKERFILE}."
            exit 1
          fi

          echo "source_image=${source_image}" >> "${GITHUB_OUTPUT}"
          echo "source_image_version=${source_image_version}" >> "${GITHUB_OUTPUT}"
          echo "command_provider_version=${command_provider_version}" >> "${GITHUB_OUTPUT}"
          echo "kubernetes_provider_version=${kubernetes_provider_version}" >> "${GITHUB_OUTPUT}"
          echo "random_provider_version=${random_provider_version}" >> "${GITHUB_OUTPUT}"
          echo "tls_provider_version=${tls_provider_version}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.version.outputs.image }}
          build-args: |
            SOURCE_IMAGE=${{ steps.image-inputs.outputs.source_image }}
            SOURCE_IMAGE_VERSION=${{ steps.image-inputs.outputs.source_image_version }}
            COMMAND_PROVIDER_VERSION=${{ steps.image-inputs.outputs.command_provider_version }}
            KUBERNETES_PROVIDER_VERSION=${{ steps.image-inputs.outputs.kubernetes_provider_version }}
            RANDOM_PROVIDER_VERSION=${{ steps.image-inputs.outputs.random_provider_version }}
            TLS_PROVIDER_VERSION=${{ steps.image-inputs.outputs.tls_provider_version }}
          labels: |
            org.opencontainers.image.base.name=${{ steps.image-inputs.outputs.source_image }}:${{ steps.image-inputs.outputs.source_image_version }}
            org.opencontainers.image.created=${{ steps.version.outputs.created }}
            org.opencontainers.image.description=Pulumi provider plugins for CodeNOW Data Plane air-gapped environments
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.vendor=CodeNOW s.r.o., https://www.codenow.com/
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            com.codenow.pulumi-plugin.command.version=${{ steps.image-inputs.outputs.command_provider_version }}
            com.codenow.pulumi-plugin.kubernetes.version=${{ steps.image-inputs.outputs.kubernetes_provider_version }}
            com.codenow.pulumi-plugin.random.version=${{ steps.image-inputs.outputs.random_provider_version }}
            com.codenow.pulumi-plugin.tls.version=${{ steps.image-inputs.outputs.tls_provider_version }}

      - name: Update operator info plugins image version
        shell: bash
        run: |
          set -euo pipefail

          tmp="$(mktemp)"
          jq --arg image "${IMAGE_NAMESPACE}/${IMAGE_NAME}" \
            --arg version "${{ steps.version.outputs.version }}" \
            '.plugins.image = $image | .plugins.version = $version' \
            "${OPERATOR_INFO_FILE}" > "${tmp}"
          mv "${tmp}" "${OPERATOR_INFO_FILE}"

          if git diff --quiet -- "${OPERATOR_INFO_FILE}"; then
            echo "${OPERATOR_INFO_FILE} already contains plugins image ${IMAGE_NAMESPACE}/${IMAGE_NAME}:${{ steps.version.outputs.version }}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${OPERATOR_INFO_FILE}"
          git commit -m "build: update Pulumi plugins image version to ${{ steps.version.outputs.version }}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Create image release tag
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "${{ steps.version.outputs.git_tag }}" \
            -m "Release Pulumi plugins image ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.git_tag }}"

      - name: Summary
        run: |
          {
            echo "## Pulumi plugins image"
            echo ""
            echo "- Git tag: \`${{ steps.version.outputs.git_tag }}\`"
            echo "- Image: \`${{ steps.version.outputs.image }}\`"
            echo "- Base image: \`${{ steps.image-inputs.outputs.source_image }}:${{ steps.image-inputs.outputs.source_image_version }}\`"
            echo "- command: \`${{ steps.image-inputs.outputs.command_provider_version }}\`"
            echo "- kubernetes: \`${{ steps.image-inputs.outputs.kubernetes_provider_version }}\`"
            echo "- random: \`${{ steps.image-inputs.outputs.random_provider_version }}\`"
            echo "- tls: \`${{ steps.image-inputs.outputs.tls_provider_version }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
